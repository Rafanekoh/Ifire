<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradutor de Mundo Real | 100% Funcional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black text-white h-screen flex flex-col overflow-hidden">

    <video id="video" autoplay playsinline class="fixed inset-0 w-full h-full object-cover z-0"></video>
    
    <div class="relative z-10 h-full flex flex-col justify-end pointer-events-none">
        <div class="bg-slate-900/90 backdrop-blur-xl p-8 rounded-t-[3rem] border-t border-white/20 pointer-events-auto">
            <div id="loading" class="hidden mb-4 flex items-center gap-2">
                <div class="w-4 h-4 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <span class="text-blue-400 text-xs font-bold uppercase tracking-widest">A IA está processando...</span>
            </div>

            <h2 id="titulo" class="text-blue-500 text-[10px] font-black uppercase tracking-[0.3em] mb-2">Resultado</h2>
            <p id="texto-principal" class="text-xl font-bold leading-tight mb-4 text-slate-100">Toque no botão para traduzir o cenário.</p>
            
            <div class="flex justify-center">
                <button id="btnCapturar" class="bg-blue-600 w-20 h-20 rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(37,99,235,0.6)] active:scale-90 transition-all">
                    <i data-lucide="scan-eye" class="w-10 h-10 text-white"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const API_KEY = "AIzaSyCKh6COajCS2BYKezSPczeJTIt84zHiRCY"; // <--- COLE SUA CHAVE AQUI
        const video = document.getElementById('video');
        const texto = document.getElementById('texto-principal');
        const loading = document.getElementById('loading');

        // 1. Iniciar Câmera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(s => video.srcObject = s)
            .catch(e => texto.innerText = "Erro ao abrir câmera. Verifique permissões.");

        // 2. Narração
        function falar(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'pt-BR';
            window.speechSynthesis.speak(m);
        }

        // 3. Captura e Envio (Corrigido para evitar erros de conexão)
        document.getElementById('btnCapturar').onclick = async () => {
            if(API_KEY === "SUA_CHAVE_AQUI") return alert("Coloque sua chave no código!");

            loading.classList.remove('hidden');
            texto.innerText = "Analisando...";

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            // Reduzimos a qualidade para 0.5 para garantir que o upload seja rápido e não dê erro
            const base64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];

            const payload = {
                contents: [{
                    parts: [
                        { text: "Diga o que é este lugar ou objeto e como agir. Responda em Português do Brasil, curto e direto." },
                        { inline_data: { mime_type: "image/jpeg", data: base64 } }
                    ]
                }]
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if(data.error) {
                    // Erro vindo da API
                    texto.innerText = "Erro da IA: " + data.error.message;
                } else {
                    const r = data.candidates[0].content.parts[0].text;
                    texto.innerText = r;
                    falar(r);
                }
            } catch (e) {
                // Erro de Conexão/CORS
                texto.innerText = "Erro de Segurança: O navegador bloqueou a conexão. Você precisa rodar este código em um servidor (HTTPS) ou LocalHost.";
                console.error(e);
            } finally {
                loading.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
