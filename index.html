<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradutor de Mundo Real | Versão Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black text-white h-screen flex flex-col overflow-hidden">

    <video id="video" autoplay playsinline class="fixed inset-0 w-full h-full object-cover z-0"></video>
    
    <div class="relative z-10 h-full flex flex-col justify-end pointer-events-none">
        <div class="bg-slate-900/95 backdrop-blur-2xl p-8 rounded-t-[3rem] border-t border-white/20 pointer-events-auto shadow-2xl">
            
            <div id="loader" class="hidden mb-4 flex items-center gap-3">
                <div class="w-5 h-5 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <span class="text-blue-400 text-xs font-bold uppercase tracking-widest">Processando...</span>
            </div>

            <div class="mb-6">
                <h2 class="text-blue-500 text-[10px] font-black uppercase tracking-[0.4em] mb-2">Visão Computacional</h2>
                <p id="texto-principal" class="text-xl font-bold leading-tight text-slate-100">Toque no botão para identificar o cenário.</p>
            </div>
            
            <div class="flex justify-center pb-6">
                <button id="btnCapturar" class="bg-blue-600 hover:bg-blue-500 w-20 h-20 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-all">
                    <i data-lucide="scan-eye" class="w-10 h-10 text-white"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // CHAVE INTEGRADA ABAIXO
        const MINHA_CHAVE = "AIzaSyCKh6COajCS2BYKezSPczeJTIt84zHiRCY"; 
        
        const video = document.getElementById('video');
        const texto = document.getElementById('texto-principal');
        const loader = document.getElementById('loader');

        // Iniciar Câmera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(s => { video.srcObject = s; })
            .catch(e => { texto.innerText = "Erro na câmera. Verifique permissões."; });

        function falar(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'pt-BR';
            window.speechSynthesis.speak(m);
        }

        document.getElementById('btnCapturar').onclick = async () => {
            loader.classList.remove('hidden');
            texto.innerText = "Analisando mundo...";

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];

            const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MINHA_CHAVE}`;

            try {
                const response = await fetch(URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Você é um guia de acessibilidade para autistas e idosos. Descreva o local ou objeto desta foto e diga como a pessoa deve agir ou o que o objeto faz. Responda em Português do Brasil, de forma curta, clara e direta." },
                                { inline_data: { mime_type: "image/jpeg", data: base64 } }
                            ]
                        }]
                    })
                });

                const data = await response.json();

                if(data.error) {
                    texto.innerText = "Erro técnico: " + data.error.message;
                } else {
                    const r = data.candidates[0].content.parts[0].text;
                    texto.innerText = r;
                    falar(r);
                }
            } catch (e) {
                texto.innerText = "Erro de conexão. Verifique se o site está em HTTPS (GitHub Pages).";
            } finally {
                loader.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
